<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT academy — Система подготовки к экзамену</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0F0A1A;
            --card: #1A112B;
            --accent: #7C3AED;
            --accent-light: #A855F7;
            --text: #F5F3FF;
            --muted: #B6AED1;
            --line: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(124,58,237,0.15), transparent 30%),
                        radial-gradient(circle at bottom left, rgba(168,85,247,0.12), transparent 30%),
                        var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 72px;
        }

        .navbar {
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #FFFFFF, #BFA7FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-right { display: flex; align-items: center; gap: 42px; }

        .nav-links { display: flex; align-items: center; gap: 36px; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: 0.3s ease;
        }

        .nav-links a:hover { color: white; }
        .nav-links a.active { color: white; }

        .upload-btn {
            border: none;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            padding: 15px 28px;
            border-radius: 14px;
            cursor: pointer;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            box-shadow: 0 10px 30px rgba(124,58,237,0.35), 0 0 25px rgba(168,85,247,0.25);
            transition: 0.35s ease;
            text-decoration: none;
            display: inline-block;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(124,58,237,0.45), 0 0 35px rgba(168,85,247,0.45);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 34px;
            margin-top: 80px;
            padding-bottom: 80px;
        }

        .card {
            background: rgba(26,17,43,0.9);
            border: 1px solid rgba(192,132,252,0.22);
            border-radius: 24px;
            padding: 34px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 40px rgba(124,58,237,0.12);
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 0 60px rgba(168,85,247,0.25);
            border-color: rgba(192,132,252,0.45);
        }

        .card-icon {
            width: 84px; height: 84px;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px;
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(255,255,255,0.06);
            color: #C084FC;
            margin-bottom: 34px;
        }

        .card h2 { font-size: 34px; margin-bottom: 14px; letter-spacing: -1px; font-weight: 600; }

        .questions {
            display: flex; align-items: center; gap: 10px;
            color: var(--muted); font-size: 15px; margin-bottom: 32px;
        }

        .questions::before {
            content: "";
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-light);
            box-shadow: 0 0 10px var(--accent-light);
        }

        .divider {
            width: 100%; height: 1px;
            background: rgba(255,255,255,0.08);
            margin-bottom: 28px;
        }

        .card p { color: var(--muted); line-height: 1.8; font-size: 16px; font-weight: 300; margin-bottom: 34px; }

        .card-btn {
            width: 100%;
            border: none; cursor: pointer;
            color: white; font-size: 16px; font-weight: 500;
            font-family: inherit;
            padding: 18px 22px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6D28D9, #C084FC);
            box-shadow: 0 12px 30px rgba(124,58,237,0.3), 0 0 20px rgba(192,132,252,0.18);
            transition: 0.35s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .card-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(124,58,237,0.45), 0 0 35px rgba(192,132,252,0.35);
        }

        .hero { padding-top: 90px; padding-bottom: 20px; }

        .hero-text h1 {
            font-size: 72px; line-height: 1; letter-spacing: -3px;
            margin-bottom: 24px; font-weight: 700;
        }

        .hero-text h1 span {
            background: linear-gradient(90deg, #7C3AED, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            max-width: 620px; color: var(--muted);
            font-size: 22px; line-height: 1.7; font-weight: 300;
        }

        @media (max-width: 1200px) { .cards { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .container { padding: 0 24px; }
            .hero-text h1 { font-size: 52px; }
            .hero-text p { font-size: 18px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="/" class="logo">IT academy</a>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="/" class="active">Предметы</a>
                    <a href="/review/today/">План повторений</a>
                </div>
                <a href="/questions/import/" class="upload-btn">+ Загрузить вопросы</a>
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
